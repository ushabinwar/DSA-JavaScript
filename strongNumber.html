<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        const strongNumber = (number) =>{
            var copy = number
            var sum = 0
            
            while(number > 0){
                var rem = number%10
                var fact = 1
                for(let i=1; i<=rem ; i++){
                    fact = fact * i
                }
                number = Math.floor(number/10)
                sum = sum + fact
            }
            if(copy === sum){
                console.log("number is strong number");
            }
            else{
                console.log("number is not a strong number")
            }

        }
        strongNumber(40585)

    </script>
    
</body>
</html>
