<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let unit = Number(prompt("enter bill unit"))
        let amount = 0

        if(unit > 400){
            amount = (unit-400) * 13
            unit = 400
        }
        if(unit > 200 && unit <= 400){
            amount += (unit-200) * 8
            unit = 200
        }
        if(unit > 100 && unit <= 200){
            amount += (unit-100) * 6
            unit = 100
        }
        amount += unit*4
        console.log("amount:",amount)
    </script>
    
</body>
</html>
